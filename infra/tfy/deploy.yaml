type: helm
name: "${TFY_APP_NAME}"
workspace_fqn: "${TFY_WORKSPACE_FQN}"
source:
  type: oci-repo
  oci_chart_url: oci://ghcr.io/adoptai/charts/browser-hitl
  version: "${CHART_VERSION}"
values:
  images:
    api:
      repository: ghcr.io/adoptai/tabby/api
      tag: "${IMAGE_TAG}"
      pullPolicy: Always
    controller:
      repository: ghcr.io/adoptai/tabby/controller
      tag: "${IMAGE_TAG}"
      pullPolicy: Always
    worker:
      repository: ghcr.io/adoptai/tabby/worker
      tag: "${IMAGE_TAG}"
      pullPolicy: Always
    novnc:
      repository: ghcr.io/adoptai/tabby/novnc
      tag: "${IMAGE_TAG}"
      pullPolicy: Always
    slackBot:
      repository: ghcr.io/adoptai/tabby/slack-bot
      tag: "${IMAGE_TAG}"
      pullPolicy: Always
    teamsBot:
      repository: ghcr.io/adoptai/tabby/teams-bot
      tag: "${IMAGE_TAG}"
      pullPolicy: Always
    adminUi:
      repository: ghcr.io/adoptai/tabby/admin-ui
      tag: "${IMAGE_TAG}"
      pullPolicy: Always

  api:
    replicas: ${API_REPLICAS}
    port: 8000
    newrelic:
      enabled: ${NEWRELIC_ENABLED}
      environment: "${NEW_RELIC_ENVIRONMENT}"
    resources:
      requests:
        cpu: "${API_CPU_REQUEST}"
        memory: "${API_MEM_REQUEST}"
      limits:
        cpu: "${API_CPU_LIMIT}"
        memory: "${API_MEM_LIMIT}"
    autoscaling:
      enabled: ${API_HPA_ENABLED}
      minReplicas: ${API_HPA_MIN_REPLICAS}
      maxReplicas: ${API_HPA_MAX_REPLICAS}
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

  controller:
    replicas: ${CONTROLLER_REPLICAS}
    newrelic:
      enabled: ${NEWRELIC_ENABLED}
      environment: "${NEW_RELIC_ENVIRONMENT}"
    resources:
      requests:
        cpu: "${CONTROLLER_CPU_REQUEST}"
        memory: "${CONTROLLER_MEM_REQUEST}"
      limits:
        cpu: "${CONTROLLER_CPU_LIMIT}"
        memory: "${CONTROLLER_MEM_LIMIT}"
    autoscaling:
      enabled: ${CONTROLLER_HPA_ENABLED}
      minReplicas: ${CONTROLLER_HPA_MIN_REPLICAS}
      maxReplicas: ${CONTROLLER_HPA_MAX_REPLICAS}
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: karpenter.sh/capacity-type
                  values:
                    - on-demand
                  operator: In

  worker:
    newrelic:
      enabled: ${NEWRELIC_ENABLED}
      environment: "${NEW_RELIC_ENVIRONMENT}"
    resources:
      requests:
        cpu: "${WORKER_CPU_REQUEST}"
        memory: "${WORKER_MEM_REQUEST}"
      limits:
        cpu: "${WORKER_CPU_LIMIT}"
        memory: "${WORKER_MEM_LIMIT}"

  slackBot:
    enabled: ${SLACK_BOT_ENABLED}
    slackDefaultChannel: "${SLACK_DEFAULT_CHANNEL}"
    newrelic:
      enabled: ${NEWRELIC_ENABLED}
      environment: "${NEW_RELIC_ENVIRONMENT}"

  teamsBot:
    enabled: false
    newrelic:
      enabled: ${NEWRELIC_ENABLED}
      environment: "${NEW_RELIC_ENVIRONMENT}"

  adminUi:
    enabled: ${ADMIN_UI_ENABLED}
    port: 8000
    newrelic:
      enabled: ${NEWRELIC_ENABLED}
      environment: "${NEW_RELIC_ENVIRONMENT}"

  config:
    publicBaseUrl: "https://${API_HOST}"
    streamHost: "${API_HOST}"
    streamProtocol: "wss"
    commitSha: "${COMMIT_SHA}"
    deployEnvironment: "${DEPLOY_ENVIRONMENT}"
    # Service-to-service auth (bots → API)
    serviceAuthAllowedTenantIds: "${SERVICE_AUTH_ALLOWED_TENANT_IDS}"
    serviceAuthAllowWildcardTenantScope: "${SVC_AUTH_WILDCARD_SCOPE}"
    # Managed service overrides — when set, Helm uses these instead of constructing
    # URLs from in-cluster service names. Leave empty to use in-cluster defaults.
    databaseUrl: "${DATABASE_URL}"
    redisUrl: "${REDIS_URL}"
    natsUrl: "${NATS_URL}"
    minioEndpoint: "${MINIO_ENDPOINT}"
    maxSessionAgeHours: "${MAX_SESSION_AGE_HOURS}"
    idleShutdownSeconds: "${IDLE_SHUTDOWN_SECONDS}"
    natsStreamMaxAgeHours: "${NATS_STREAM_MAX_AGE_HOURS}"
    minioOrphanMaxAgeHours: "${MINIO_ORPHAN_MAX_AGE_HOURS}"
    apiDocsEnabled: "${API_DOCS_ENABLED}"
    reconcileBatchSize: "${RECONCILE_BATCH_SIZE}"
    # Warm recording-session pool (per-environment control via GitHub secrets).
    # Unset ⇒ envsubst leaves these empty and the chart falls back to its
    # defaults (size 3 / residential 0 / tenants "" ⇒ pool off).
    recordingPoolSize: "${RECORDING_POOL_SIZE}"
    recordingPoolResidentialSize: "${RECORDING_POOL_RESIDENTIAL_SIZE}"
    recordingPoolTenants: "${RECORDING_POOL_TENANTS}"
    workerImagePullPolicy: "${WORKER_IMAGE_PULL_POLICY}"

  postgres:
    enabled: ${POSTGRES_ENABLED}
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: "${POSTGRES_CPU_REQUEST}"
        memory: "${POSTGRES_MEM_REQUEST}"
      limits:
        cpu: "${POSTGRES_CPU_LIMIT}"
        memory: "${POSTGRES_MEM_LIMIT}"
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: karpenter.sh/capacity-type
                  values:
                    - on-demand
                  operator: In

  redis:
    enabled: ${REDIS_ENABLED}
    persistence:
      size: 5Gi
    resources:
      requests:
        cpu: "${REDIS_CPU_REQUEST}"
        memory: "${REDIS_MEM_REQUEST}"
      limits:
        cpu: "${REDIS_CPU_LIMIT}"
        memory: "${REDIS_MEM_LIMIT}"
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: karpenter.sh/capacity-type
                  values:
                    - on-demand
                  operator: In

  nats:
    enabled: ${NATS_ENABLED}
    persistence:
      size: 10Gi
    resources:
      requests:
        cpu: "${NATS_CPU_REQUEST}"
        memory: "${NATS_MEM_REQUEST}"
      limits:
        cpu: "${NATS_CPU_LIMIT}"
        memory: "${NATS_MEM_LIMIT}"
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: karpenter.sh/capacity-type
                  values:
                    - on-demand
                  operator: In
    jetstream:
      maxMemory: "${NATS_JS_MAX_MEMORY}"

  minio:
    enabled: ${MINIO_ENABLED}
    persistence:
      size: 50Gi
    resources:
      requests:
        cpu: "${MINIO_CPU_REQUEST}"
        memory: "${MINIO_MEM_REQUEST}"
      limits:
        cpu: "${MINIO_CPU_LIMIT}"
        memory: "${MINIO_MEM_LIMIT}"

  egressProxy:
    enabled: true
    allowInsecureAdmin: true
    allowInsecureSessionAllowlist: true
    resources:
      requests:
        cpu: "${EGRESS_CPU_REQUEST}"
        memory: "${EGRESS_MEM_REQUEST}"
      limits:
        cpu: "${EGRESS_CPU_LIMIT}"
        memory: "${EGRESS_MEM_LIMIT}"
    defaultAllowlist:
      - ".apollo.io"
      - ".transcend-cdn.com"
      - ".wowscale.com"
      - ".sentry.io"
      - ".fullview.io"
      - ".intercom.io"
      - ".customer.io"
      - ".6sense.com"
      - ".6si.com"
      - ".6sc.co"
      - ".pendo.io"
      - ".pendo-static-5698236162899968.storage.googleapis.com"
      - ".descope.com"
      - ".descopecdn.com"
      - ".ingest-lr.com"
      - ".logrocket.io"
      - ".lr-in-prod.com"
      - ".lr-ingest.com"
      - ".lr-in.com"
      - ".lr-ingest.io"
      - ".datadoghq.com"
      - ".rollbar.com"
      - ".mxpnl.com"
