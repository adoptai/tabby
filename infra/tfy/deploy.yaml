  ingress:
    enabled: false

  secrets:
    postgresPassword: "${POSTGRES_PASSWORD}"
    jwtSigningKey: "${JWT_SIGNING_KEY}"
    tenantEncryptionKey: "${TENANT_ENCRYPTION_KEY}"
    minioAccessKey: "${MINIO_ACCESS_KEY}"
    minioSecretKey: "${MINIO_SECRET_KEY}"
    adminBootstrapPassword: "${ADMIN_BOOTSTRAP_PASSWORD}"
    egressProxyAdminToken: "${EGRESS_PROXY_ADMIN_TOKEN}"
    egressProxySessionKey: "${EGRESS_PROXY_SESSION_KEY}"
    egressUpstreamProxyUrl: "${EGRESS_UPSTREAM_PROXY_URL}"
    serviceAuthClientId: "${SERVICE_AUTH_CLIENT_ID}"
    serviceAuthClientSecret: "${SERVICE_AUTH_CLIENT_SECRET}"
    slackBotToken: "${SLACK_BOT_TOKEN}"
    slackSigningSecret: "${SLACK_SIGNING_SECRET}"
    slackAppToken: "${SLACK_APP_TOKEN}"
    metricsAuthToken: "${METRICS_AUTH_TOKEN}"
    natsAuthToken: "${NATS_AUTH_TOKEN}"
    agentSecretHmacKey: "${AGENT_SECRET_HMAC_KEY}"
    idpClientId: "${IDP_CLIENT_ID}"
    idpClientSecret: "${IDP_CLIENT_SECRET}"
    newrelicLicenseKey: "${NEW_RELIC_LICENSE_KEY}"

  virtualServices:
    api:
      host: "${API_HOST}"
      gateway: istio-system/tfy-wildcard
      port: 8000
    adminUi:
      host: "${ADMIN_HOST}"
      gateway: istio-system/tfy-wildcard
      port: 8000
