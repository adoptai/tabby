      - ".workday.com"
      - ".workdaycdn.com"
      # --- Adopt platform assets + Frontegg-hosted logins (Spendflo etc.) ---
      - ".adopt.ai"
      - ".frontegg.com"
      - ".spendflo.com"
      - ".googleusercontent.com"
      # --- BeyondRisk / Adopt Bank demo VM (exact host, kept narrow) ---
