      - ".cdn.auth0.com"
      - ".heap-api.com"
      - ".tailwindcss.com"
      - ".object-assign.min.js"
      - ".msc.com"
      - ".mymsc.com"
      - ".b2clogin.com"
      - ".mscciam.b2clogin.com"
      - ".identityserver.msc.com"
      - ".onmicrosoft.com"
      - ".greenxtrade.com"
      - ".bluextrade.com"
      - ".cookiehub.eu"
      - ".bootstrapcdn.com"
      - ".carrierxtrade.com"
      - ".recaptcha.net"
