# =============================================================================
# Browser HITL Helm Chart - Default Values
# Per spec sections 15.4, 15.7, 15.10, 15.11
# =============================================================================

# -- Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""  # Default: use cluster default (local-path for k3s, standard otherwise)
  grafanaLabels: false  # Enable in production for truefoundry.com/application log routing labels

# -- Extra Kubernetes objects (VirtualServices, etc.)
extraObjects: []

# -- VirtualServices (Istio) — set gateway + hosts to enable
virtualServices: {}

# =============================================================================
# Image Tags
# =============================================================================
images:
  api:
    repository: ghcr.io/adoptai/tabby/api
    tag: "0.1.1"
    pullPolicy: IfNotPresent
  controller:
    repository: ghcr.io/adoptai/tabby/controller
    tag: "0.1.1"
    pullPolicy: IfNotPresent
  worker:
    repository: ghcr.io/adoptai/tabby/worker
    tag: "0.1.1"
    pullPolicy: IfNotPresent
  novnc:
    repository: ghcr.io/adoptai/tabby/novnc
    tag: "0.1.1"
    pullPolicy: IfNotPresent
  slackBot:
    repository: ghcr.io/adoptai/tabby/slack-bot
    tag: "0.1.1"
    pullPolicy: IfNotPresent
  teamsBot:
    repository: ghcr.io/adoptai/tabby/teams-bot
    tag: "0.1.1"
    pullPolicy: IfNotPresent
  adminUi:
    repository: ghcr.io/adoptai/tabby/admin-ui
    tag: "0.1.1"
    pullPolicy: IfNotPresent

# =============================================================================
# API Service (NestJS) - Port 8000
# Per spec section 15.7: request 0.5 vCPU, 512 MB RAM
# =============================================================================
api:
  replicas: 1
  port: 8000
  health:
    liveness: /health/live
    readiness: /health/ready
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Session Controller (NestJS standalone) - Port 8090
# Per spec section 15.7: request 0.5 vCPU, 512 MB RAM
# =============================================================================
controller:
  replicas: 1
  port: 8090
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Browser Worker (Dynamic pods created by controller)
# Per spec section 15.7: request 0.5 vCPU / 1 GB, limit 1.5 vCPU / 1.5 GB
# =============================================================================
worker:
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "1536Mi"
  novnc:
    port: 6080
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
  healthPort: 8091
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Slack Bot - Per spec section 15.7: request 0.25 vCPU, 256 MB RAM
# =============================================================================
slackBot:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Slack-specific env vars
  slackBotToken: ""
  slackSigningSecret: ""
  slackAppToken: ""
  slackDefaultChannel: ""

# =============================================================================
# Teams Bot - Per spec section 15.7: request 0.25 vCPU, 256 MB RAM
# =============================================================================
teamsBot:
  enabled: true
  replicas: 1
  port: 3978
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Teams-specific env vars
  microsoftAppId: ""
  microsoftAppPassword: ""
  teamsDefaultChannel: ""

# =============================================================================
# Admin UI (Next.js) - Port 8000
# =============================================================================
adminUi:
  enabled: true
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# PostgreSQL - Per spec section 15.10: single replica, 20Gi PVC
# =============================================================================
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16.8-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 5432
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""  # Uses global.storageClass if empty
    accessMode: ReadWriteOnce
  auth:
    database: browser_hitl
    username: browser_hitl
    password: ""  # Set via secrets
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Redis - Per spec section 15.10: single replica, 5Gi PVC
# =============================================================================
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.4-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 6379
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# NATS JetStream - Per spec section 15.10: single replica, 10Gi PVC
# MANDATORY: sync_interval: always (Jepsen-validated durability)
# =============================================================================
nats:
  enabled: true
  image:
    repository: nats
    tag: "2.10.24-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 4222
  monitorPort: 8222
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  jetstream:
    enabled: true
    syncInterval: always  # MANDATORY per spec - Jepsen-validated durability
    maxMemory: 256Mi
    maxStorage: 10Gi
  # NATS authentication (C7 remediation)
  auth:
    enabled: false  # Enable in production
    token: ""       # Set via secrets; or use nkey/accounts for multi-tenant
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# MinIO - Per spec section 15.10: single replica, 50Gi PVC
# =============================================================================
minio:
  enabled: true
  image:
    repository: minio/minio
    tag: "RELEASE.2025-03-12T18-04-18Z"
    pullPolicy: IfNotPresent
  replicas: 1
  port: 9000
  consolePort: 9001
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  auth:
    accessKey: ""  # Set via secrets
    secretKey: ""  # Set via secrets
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Egress Proxy - Required for FQDN allowlisting enforcement
# =============================================================================
egressProxy:
  enabled: true
  image:
    repository: node
    tag: "20.18.1-alpine"
    pullPolicy: IfNotPresent
  port: 3128
  adminPort: 8095
  allowInsecureAdmin: false
  allowInsecureSessionAllowlist: false
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Baseline allowlist (controller sync should extend this set).
  defaultAllowlist:
    - ".example.com"
  nodeSelector: {}
  tolerations: []
  affinity: {}

# =============================================================================
# Ingress - Per spec section 15.11: NGINX ingress controller
# =============================================================================
# =============================================================================
# Network Policies (H12 remediation) — restrict inter-service traffic
# =============================================================================
networkPolicies:
  enabled: false  # Enable in production

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # TLS scaffolding (C6 remediation) — uncomment in production:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  host: browser-hitl.local
  tls:
    enabled: false  # Enable in production with cert-manager
    secretName: browser-hitl-tls

# =============================================================================
# Runtime Configuration (Env Vars) - Per spec section 15.4
# =============================================================================
config:
  # Database — NOTE: DATABASE_URL is now constructed in configmap.yaml from
  # postgres.auth.username, secrets.postgresPassword, postgres.auth.database, and postgres.port.
  # The value below is kept only as documentation / fallback reference.
  databaseUrl: ""  # constructed from postgres.auth + secrets.postgresPassword
  # Redis — leave empty to auto-resolve from release name
  redisUrl: ""
  # NATS — leave empty to auto-resolve from release name
  natsUrl: ""
  natsSyncInterval: "always"  # MANDATORY
  # MinIO — leave empty to auto-resolve from release name
  minioEndpoint: ""
  minioAccessKey: ""
  minioSecretKey: ""
  # JWT
  jwtSigningKey: ""
  jwtSigningKeyId: "key-1"
  # Bootstrap
  adminBootstrapEmail: "admin@browser-hitl.local"
  adminBootstrapPassword: ""
  bootstrapTenantName: "default"
  # Tuning defaults (per spec section 15.4)
  streamTtlSeconds: "600"
  defaultBackoffSeconds: "30"
  defaultKeepaliveSeconds: "300"
  reconcileIntervalSeconds: "15"
  maxSessionAgeHours: "24"
  idleShutdownSeconds: "0"  # 0 = disabled. Set >DEFAULT_KEEPALIVE_SECONDS (300) to enable idle pod reclaim.
  natsStreamMaxAgeHours: "8"
  minioOrphanMaxAgeHours: "2"
  publicBaseUrl: ""
  streamHost: ""
  streamProtocol: ""
  # Service-to-service auth defaults (bots -> API)
  serviceAuthAllowedTenantIds: ""
  serviceAuthAllowWildcardTenantScope: "true"
  serviceAuthAllowedRoles: "Operator"
  serviceAuthDefaultRole: "Operator"
  serviceAuthTokenTtlSeconds: "3600"
  # Agent wrapper defaults (POST /agent/run-url)
  agentDefaultCredentialRef: ""
  agentDefaultSlackChannel: ""
  # Environment label for worker pods (e.g. "staging", "production")
  deployEnvironment: ""
  # Swagger/OpenAPI docs at /api/docs — set "false" to disable (e.g. production)
  apiDocsEnabled: "true"
  # Sentry error tracking — disabled by default; enable in production cloud only (not on-prem)
  sentryDsn: ""
  sentryEnabled: "false"
  sentryTracesSampleRate: "0.1"
  # Bypass proxy for in-cluster/local endpoints while keeping external egress on proxy.
  egressProxyBypassList: "localhost;127.0.0.1;::1;*.svc;*.svc.cluster.local;*.cluster.local;test-harness;browser-hitl-test-harness"
  # Egress proxy
  egressProxyUrl: ""
  egressProxyAllowlistUrl: ""
  egressPolicyFailClosed: "true"
  circuitBreakerAppFailureThreshold: "5"
  circuitBreakerTenantFailureThreshold: "50"
  circuitBreakerWindowSeconds: "900"
  circuitBreakerCooldownSeconds: "300"
  lifecycleArtifactRetentionDays: "7"
  lifecycleInterventionRetentionDays: "30"
  lifecycleSessionRetentionDays: "14"
  lifecycleAppRetentionDays: "30"
  workerAllowEnvCredentialFallback: "false"
  reconcileBatchSize: "50"

# =============================================================================
# Secrets (sensitive values - override in production)
# =============================================================================
secrets:
  postgresPassword: "changeme"
  redisPassword: ""
  jwtSigningKey: "changeme-jwt-signing-key-minimum-32-chars"
  minioAccessKey: "minioadmin"
  minioSecretKey: "minioadmin"
  adminBootstrapPassword: "changeme-admin-password"
  egressProxyAdminToken: "changeme-egress-proxy-admin-token"
  egressProxySessionKey: "changeme-egress-proxy-session-key"
  slackBotToken: ""
  slackSigningSecret: ""
  slackAppToken: ""
  serviceAuthClientId: ""
  serviceAuthClientSecret: ""
  microsoftAppId: ""
  microsoftAppPassword: ""
  # NATS auth token (C7 remediation) — set in production
  natsAuthToken: ""
  # Metrics auth token (C4 remediation) — set in production
  metricsAuthToken: ""
  # 64-char hex string (32 bytes) for AES-256-GCM artifact encryption
  # Generate with: openssl rand -hex 32
  tenantEncryptionKey: ""
  # IdP OAuth client credentials (required for browser OAuth login flow)
  # Set these instead of storing client_id/client_secret in the DB
  idpClientId: ""
  idpClientSecret: ""

# =============================================================================
# Alerting (C8 remediation) — PrometheusRule CRDs for kube-prometheus-stack
# =============================================================================
# =============================================================================
# Backup CronJobs (C5 remediation) — pg_dump to MinIO/S3
# =============================================================================
backup:
  enabled: false  # Enable in production
  schedule: "0 2 * * *"  # Daily at 2am UTC
  bucket: "browser-hitl-backups"
  retentionCount: 30  # Keep last 30 backups
  timeoutSeconds: 1800  # 30 min max
  historyLimit: 3
  failedHistoryLimit: 3
  image: "postgres:16-alpine"

alerting:
  enabled: false  # Enable in production with kube-prometheus-stack
  prometheusInstance: "kube-prometheus"
  thresholds:
    sessionFailureRate: 0.1       # Alert if >10% sessions fail (5m window)
    hitlLatencyP95Ms: 30000       # Alert if p95 HITL latency >30s
    hitlTimeoutRate: 0.05         # Alert if >5% HITL timeouts (10m window)
