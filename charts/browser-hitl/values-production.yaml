# =============================================================================
# Browser HITL - PRODUCTION Overrides
# =============================================================================
# Usage:
#   helm upgrade --install browser-hitl charts/browser-hitl \
#     -f charts/browser-hitl/values-production.yaml \
#     --namespace browser-hitl --create-namespace \
#     --set secrets.postgresPassword=$PG_PASSWORD \
#     --set secrets.jwtSigningKey=$JWT_KEY \
#     --set secrets.tenantEncryptionKey=$ENC_KEY
# =============================================================================

# HA replicas
api:
  replicas: 2
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: api
            topologyKey: kubernetes.io/hostname

controller:
  replicas: 1  # Controller uses distributed lock; only one active leader

# Infrastructure: HA where applicable
postgres:
  replicas: 1  # Use managed PostgreSQL (RDS/CloudSQL) in production
  persistence:
    size: 100Gi
    storageClass: "gp3"  # AWS EBS gp3, change for GCP/Azure

redis:
  replicas: 1  # Use managed Redis (ElastiCache/Memorystore) in production
  persistence:
    size: 10Gi
    storageClass: "gp3"

nats:
  replicas: 3  # HA NATS cluster
  auth:
    enabled: true  # REQUIRED in production
    # token: set via --set secrets.natsAuthToken=<token>
  persistence:
    size: 20Gi
    storageClass: "gp3"

minio:
  replicas: 1  # Use managed S3/GCS in production
  persistence:
    size: 100Gi
    storageClass: "gp3"

# TLS enabled via cert-manager (C6 remediation)
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  host: ""  # MUST be set: --set ingress.host=browser-hitl.example.com
  tls:
    enabled: true
    secretName: browser-hitl-tls

# Network policies ENABLED (H12 remediation)
networkPolicies:
  enabled: true

# Storage class explicit (M10 remediation)
global:
  storageClass: "gp3"  # Change for GCP (pd-ssd) or Azure (managed-premium)

# Production config overrides
config:
  # CORS: restrict to your domain
  # Set via: --set config.corsOrigin=https://browser-hitl.example.com
  egressPolicyFailClosed: "true"

# Secrets: ALL must be set via --set or External Secrets Operator
# DO NOT commit production secrets in this file
secrets:
  postgresPassword: ""    # REQUIRED
  jwtSigningKey: ""        # REQUIRED — openssl rand -base64 48
  minioAccessKey: ""       # REQUIRED
  minioSecretKey: ""       # REQUIRED
  adminBootstrapPassword: ""  # REQUIRED — strong password
  metricsAuthToken: ""     # REQUIRED — openssl rand -hex 32
  natsAuthToken: ""        # REQUIRED — openssl rand -hex 32
  tenantEncryptionKey: ""  # REQUIRED — openssl rand -hex 32
  egressProxyAdminToken: ""   # REQUIRED
  egressProxySessionKey: ""   # REQUIRED
  serviceAuthClientId: ""     # REQUIRED for bot auth
  serviceAuthClientSecret: "" # REQUIRED for bot auth

# Backup ENABLED (C5 remediation)
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2am UTC
  retentionCount: 30

# Alerting ENABLED (C8 remediation)
alerting:
  enabled: true
  prometheusInstance: "kube-prometheus"
  thresholds:
    sessionFailureRate: 0.1
    hitlLatencyP95Ms: 30000
    hitlTimeoutRate: 0.05
