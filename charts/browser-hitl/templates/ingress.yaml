{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "browser-hitl.fullname" . }}
  labels:
    {{- include "browser-hitl.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "browser-hitl.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          # WebSocket events endpoint (same API server, upgraded connection)
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: {{ include "browser-hitl.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          # noVNC viewer bootstrap pages served by API
          - path: /vnc
            pathType: Prefix
            backend:
              service:
                name: {{ include "browser-hitl.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          # noVNC websocket upgrade endpoint proxied by API
          - path: /vnc-ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "browser-hitl.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          # Auth endpoints
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "browser-hitl.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          # Health endpoint
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "browser-hitl.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          {{- if .Values.adminUi.enabled }}
          # Admin UI (catch-all for frontend routes)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "browser-hitl.fullname" . }}-admin-ui
                port:
                  number: {{ .Values.adminUi.port }}
          {{- end }}
          {{- if .Values.teamsBot.enabled }}
          # Teams Bot webhook endpoint
          - path: /api/messages
            pathType: Exact
            backend:
              service:
                name: {{ include "browser-hitl.fullname" . }}-teams-bot
                port:
                  number: {{ .Values.teamsBot.port }}
          {{- end }}
{{- end }}
