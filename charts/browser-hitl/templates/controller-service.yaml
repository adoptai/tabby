apiVersion: v1
kind: Service
metadata:
  name: {{ include "browser-hitl.fullname" . }}-controller
  labels:
    {{- include "browser-hitl.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.controller.port }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "browser-hitl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: controller
