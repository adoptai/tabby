{{- if .Values.nats.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "browser-hitl.fullname" . }}-nats
  labels:
    {{- include "browser-hitl.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.nats.port }}
      targetPort: client
      protocol: TCP
      name: client
    - port: {{ .Values.nats.monitorPort }}
      targetPort: monitor
      protocol: TCP
      name: monitor
  selector:
    {{- include "browser-hitl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nats
{{- end }}
