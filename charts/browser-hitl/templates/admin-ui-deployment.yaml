{{- if .Values.adminUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "browser-hitl.fullname" . }}-admin-ui
  labels:
    {{- include "browser-hitl.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-ui
spec:
  replicas: {{ .Values.adminUi.replicas }}
  selector:
    matchLabels:
      {{- include "browser-hitl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin-ui
  template:
    metadata:
      labels:
        {{- include "browser-hitl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin-ui
    spec:
      {{- include "browser-hitl.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: admin-ui
          image: {{ include "browser-hitl.image" (dict "global" .Values.global "image" .Values.images.adminUi) }}
          imagePullPolicy: {{ .Values.images.adminUi.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.adminUi.port }}
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: {{ (.Values.config.publicBaseUrl | default (printf "http://%s-api:%v" (include "browser-hitl.fullname" .) .Values.api.port)) | quote }}
            - name: PORT
              value: {{ .Values.adminUi.port | quote }}
          resources:
            {{- toYaml .Values.adminUi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- with .Values.adminUi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.adminUi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.adminUi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
