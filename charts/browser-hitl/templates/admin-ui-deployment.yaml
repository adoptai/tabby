{{- if .Values.adminUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "browser-hitl.fullname" . }}-admin-ui
  labels:
    {{- include "browser-hitl.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-ui
spec:
  replicas: {{ .Values.adminUi.replicas }}
  selector:
    matchLabels:
      {{- include "browser-hitl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin-ui
  template:
    metadata:
      labels:
        {{- include "browser-hitl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin-ui
    spec:
      {{- include "browser-hitl.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: admin-ui
          image: {{ include "browser-hitl.image" (dict "global" .Values.global "image" .Values.images.adminUi) }}
          imagePullPolicy: {{ .Values.images.adminUi.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.adminUi.port }}
              protocol: TCP
          envFrom:
            # New Relic license key — optional. See api-deployment.yaml.
            - secretRef:
                name: newrelic-license
                optional: true
          env:
            - name: NEXT_PUBLIC_API_URL
              value: {{ (.Values.config.publicBaseUrl | default (printf "http://%s-api:%v" (include "browser-hitl.fullname" .) .Values.api.port)) | quote }}
            - name: PORT
              value: {{ .Values.adminUi.port | quote }}
            # New Relic Node APM (server-side) — see apps/admin-ui/newrelic.js.
            - name: NEWRELIC_ENABLED
              value: {{ .Values.adminUi.newrelic.enabled | default false | quote }}
            - name: NEW_RELIC_APP_NAME
              value: "Adopt Tabby Admin UI"
            - name: NEW_RELIC_ENVIRONMENT
              value: {{ .Values.adminUi.newrelic.environment | default "production" | quote }}
            # New Relic Browser SDK (client-side). Gated by NEXT_PUBLIC_NEWRELIC_ENABLED.
            # License key, app ID, and account ID are inlined into the served HTML
            # at runtime — they are public per-app NR Browser identifiers, not the
            # APM license. Set via values.yaml or empty to disable.
            - name: NEXT_PUBLIC_NEWRELIC_ENABLED
              value: {{ .Values.adminUi.newrelic.browser.enabled | default false | quote }}
            - name: NEXT_PUBLIC_NEW_RELIC_BROWSER_LICENSE_KEY
              value: {{ .Values.adminUi.newrelic.browser.licenseKey | default "" | quote }}
            - name: NEXT_PUBLIC_NEW_RELIC_BROWSER_APP_ID
              value: {{ .Values.adminUi.newrelic.browser.applicationId | default "" | quote }}
            - name: NEXT_PUBLIC_NEW_RELIC_BROWSER_ACCOUNT_ID
              value: {{ .Values.adminUi.newrelic.browser.accountId | default "" | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.adminUi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      {{- with .Values.adminUi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.adminUi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.adminUi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
