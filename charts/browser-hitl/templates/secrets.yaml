apiVersion: v1
kind: Secret
metadata:
  name: {{ include "browser-hitl.secretName" . }}
  labels:
    {{- include "browser-hitl.labels" . | nindent 4 }}
type: Opaque
data:
  # Sensitive values - base64 encoded
  # Per spec section 15.4 - all secrets MUST be injected from K8s Secrets
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  JWT_SIGNING_KEY: {{ .Values.secrets.jwtSigningKey | b64enc | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | b64enc | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | b64enc | quote }}
  ADMIN_BOOTSTRAP_PASSWORD: {{ .Values.secrets.adminBootstrapPassword | b64enc | quote }}
  {{- if .Values.secrets.egressProxyAdminToken }}
  EGRESS_PROXY_ADMIN_TOKEN: {{ .Values.secrets.egressProxyAdminToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.egressProxySessionKey }}
  EGRESS_PROXY_SESSION_KEY: {{ .Values.secrets.egressProxySessionKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.egressUpstreamProxyUrl }}
  EGRESS_UPSTREAM_PROXY_URL: {{ .Values.secrets.egressUpstreamProxyUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.redisPassword }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- end }}
  # Slack Bot secrets — always include keys (even if empty) so secretKeyRef
  # doesn't cause CreateContainerConfigError when bots are enabled
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | default "" | b64enc | quote }}
  SLACK_SIGNING_SECRET: {{ .Values.secrets.slackSigningSecret | default "" | b64enc | quote }}
  SLACK_APP_TOKEN: {{ .Values.secrets.slackAppToken | default "" | b64enc | quote }}
  SERVICE_AUTH_CLIENT_ID: {{ .Values.secrets.serviceAuthClientId | default "" | b64enc | quote }}
  SERVICE_AUTH_CLIENT_SECRET: {{ .Values.secrets.serviceAuthClientSecret | default "" | b64enc | quote }}
  # NATS auth token (C7 remediation)
  {{- if and .Values.nats.auth .Values.nats.auth.token }}
  nats-auth-token: {{ .Values.nats.auth.token | b64enc | quote }}
  {{- end }}
  # Metrics auth token (C4 remediation)
  {{- if .Values.secrets.metricsAuthToken }}
  METRICS_AUTH_TOKEN: {{ .Values.secrets.metricsAuthToken | b64enc | quote }}
  {{- end }}
  # Tenant encryption key for artifact encryption (AES-256-GCM)
  {{- if .Values.secrets.tenantEncryptionKey }}
  TENANT_ENCRYPTION_KEY: {{ .Values.secrets.tenantEncryptionKey | b64enc | quote }}
  {{- end }}
  # Agent client HMAC signing key
  {{- if .Values.secrets.agentSecretHmacKey }}
  AGENT_SECRET_HMAC_KEY: {{ .Values.secrets.agentSecretHmacKey | b64enc | quote }}
  {{- end }}
  # Teams Bot secrets — always include keys (even if empty)
  MICROSOFT_APP_ID: {{ .Values.secrets.microsoftAppId | default "" | b64enc | quote }}
  MICROSOFT_APP_PASSWORD: {{ .Values.secrets.microsoftAppPassword | default "" | b64enc | quote }}
  {{- if .Values.secrets.idpClientId }}
  IDP_CLIENT_ID: {{ .Values.secrets.idpClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.idpClientSecret }}
  IDP_CLIENT_SECRET: {{ .Values.secrets.idpClientSecret | b64enc | quote }}
  {{- end }}
