apiVersion: v1
kind: Service
metadata:
  name: {{ include "browser-hitl.fullname" . }}-api
  labels:
    {{- include "browser-hitl.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "browser-hitl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
