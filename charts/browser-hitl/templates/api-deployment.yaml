apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "browser-hitl.fullname" . }}-api
  labels:
    {{- include "browser-hitl.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    {{- if .Values.global.grafanaLabels }}
    truefoundry.com/application: {{ include "browser-hitl.fullname" . }}-api
    {{- end }}
spec:
  replicas: {{ .Values.api.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "browser-hitl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "browser-hitl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- include "browser-hitl.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: {{ include "browser-hitl.image" (dict "global" .Values.global "image" .Values.images.api) }}
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "browser-hitl.configmapName" . }}
            # New Relic license key — optional. Mount as
            # NEW_RELIC_LICENSE_KEY when the cluster operator has created
            # the `newrelic-license` Secret. When absent the agent stays
            # disabled because the entry file checks for the key.
            - secretRef:
                name: newrelic-license
                optional: true
          env:
            # New Relic APM toggle (see apps/api/newrelic.js).
            - name: NEWRELIC_ENABLED
              value: {{ .Values.api.newrelic.enabled | default false | quote }}
            - name: NEW_RELIC_APP_NAME
              value: "Adopt Tabby API"
            - name: NEW_RELIC_ENVIRONMENT
              value: {{ .Values.api.newrelic.environment | default "production" | quote }}
            # Secrets injected individually from Secret resource
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: JWT_SIGNING_KEY
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: MINIO_SECRET_KEY
            - name: ADMIN_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: ADMIN_BOOTSTRAP_PASSWORD
            - name: SERVICE_AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: SERVICE_AUTH_CLIENT_ID
                  optional: true
            - name: SERVICE_AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: SERVICE_AUTH_CLIENT_SECRET
                  optional: true
            - name: TENANT_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: TENANT_ENCRYPTION_KEY
                  optional: true
            - name: AGENT_SECRET_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: AGENT_SECRET_HMAC_KEY
                  optional: true
            - name: IDP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: IDP_CLIENT_ID
                  optional: true
            - name: IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "browser-hitl.secretName" . }}
                  key: IDP_CLIENT_SECRET
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.health.liveness | quote }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: {{ .Values.api.health.readiness | quote }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
