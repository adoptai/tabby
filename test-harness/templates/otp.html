<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>OTP Verification - Enterprise Auth Portal</title>
    <style>
        :root {
            --bg-0: #0f172a;
            --bg-1: #12213d;
            --card: #f8fafc;
            --ink: #0f172a;
            --muted: #475569;
            --accent: #0f766e;
            --accent-hover: #0d5f59;
            --danger-bg: #fee2e2;
            --danger-ink: #991b1b;
            --ring: rgba(15, 118, 110, 0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background:
                radial-gradient(circle at 18% 15%, #0ea5e9 0%, transparent 38%),
                radial-gradient(circle at 82% 85%, #14b8a6 0%, transparent 42%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
        }
        .otp-card {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            border-radius: 16px;
            padding: 32px 28px;
            box-shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
            color: var(--ink);
        }
        .eyebrow {
            margin: 0 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 12px;
            color: var(--muted);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 30px;
            line-height: 1.1;
        }
        .subtitle {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
        }
        #otp {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            letter-spacing: 0.08em;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }
        #otp:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--ring);
        }
        #otp-submit {
            width: 100%;
            margin-top: 16px;
            border: 0;
            border-radius: 10px;
            padding: 12px 14px;
            color: #fff;
            background: var(--accent);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s ease;
        }
        #otp-submit:hover { background: var(--accent-hover); }
        #error-message {
            margin-bottom: 14px;
            border-radius: 10px;
            padding: 10px 12px;
            background: var(--danger-bg);
            color: var(--danger-ink);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main class="otp-card">
        <p class="eyebrow">Security Verification</p>
        <h1>Enter OTP Code</h1>
        <p class="subtitle">Provide the one-time code to resume the agent workflow.</p>
        {% if error %}
        <div id="error-message">{{ error }}</div>
        {% endif %}
        <form method="post" action="/otp">
            <input type="hidden" name="_csrf" value="{{ csrf_token }}">
            <div>
                <label for="otp">One-Time Password</label>
                <input type="text" id="otp" name="otp" required autocomplete="one-time-code">
            </div>
            <div>
                <button type="submit" id="otp-submit">Verify and Continue</button>
            </div>
        </form>
    </main>
</body>
</html>
