<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Login - Enterprise Auth Portal</title>
    <style>
        :root {
            --bg-0: #0b1220;
            --bg-1: #111c33;
            --card: #f8fafc;
            --ink: #0f172a;
            --muted: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --danger-bg: #fee2e2;
            --danger-ink: #991b1b;
            --ring: rgba(37, 99, 235, 0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 20% 10%, #1e40af 0%, transparent 45%),
                radial-gradient(circle at 80% 90%, #0f766e 0%, transparent 38%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            padding: 24px;
        }
        .auth-card {
            width: 100%;
            max-width: 460px;
            background: var(--card);
            border-radius: 16px;
            padding: 32px 28px;
            box-shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
        }
        .eyebrow {
            margin: 0 0 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 12px;
            color: var(--muted);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 30px;
            line-height: 1.1;
        }
        .subtitle {
            margin: 0 0 22px;
            color: var(--muted);
            font-size: 14px;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--ring);
        }
        #login-button {
            width: 100%;
            margin-top: 8px;
            border: 0;
            border-radius: 10px;
            padding: 12px 14px;
            color: #fff;
            background: var(--accent);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s ease;
        }
        #login-button:hover { background: var(--accent-hover); }
        #error-message {
            margin-bottom: 14px;
            border-radius: 10px;
            padding: 10px 12px;
            background: var(--danger-bg);
            color: var(--danger-ink);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main class="auth-card">
        <p class="eyebrow">Enterprise Auth Portal</p>
        <h1>Sign in</h1>
        <p class="subtitle">Authenticate to continue to the protected dashboard.</p>
        {% if error %}
        <div id="error-message">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <input type="hidden" name="_csrf" value="{{ csrf_token }}">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div>
                <button type="submit" id="login-button">Continue</button>
            </div>
        </form>
    </main>
</body>
</html>
