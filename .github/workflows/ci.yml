# =============================================================================
# Browser HITL CI/CD Pipeline
# Per spec Task 63: lint -> test -> build -> SBOM -> e2e -> publish
# Uses pnpm + NX for monorepo orchestration
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/browser-hitl

permissions:
  contents: read
  packages: write
  id-token: write  # For cosign keyless signing

jobs:
  # ===========================================================================
  # Stage 1: Lint
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (NX)
        run: pnpm nx run-many --target=lint --all --parallel=3

  # ===========================================================================
  # Stage 1.5: SCA / Vulnerability Scanning (M12 remediation)
  # ===========================================================================
  sca:
    name: SCA Scan
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true
        # Non-blocking: logs vulnerabilities but does not fail the pipeline.
        # Set to `pnpm audit --audit-level=high` (without || true) to enforce.

  # ===========================================================================
  # Stage 2: Test
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: browser_hitl_test
          POSTGRES_USER: browser_hitl
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://browser_hitl:testpassword@localhost:5432/browser_hitl_test
      REDIS_URL: redis://localhost:6379
      JWT_SIGNING_KEY: test-jwt-signing-key-minimum-32-characters-long
      JWT_SIGNING_KEY_ID: test-key-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (NX)
        run: pnpm nx run-many --target=test --all --parallel=3

  # ===========================================================================
  # Stage 3: Build Docker Images
  # ===========================================================================
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: infra/docker/Dockerfile.api
            context: .
          - service: worker
            dockerfile: infra/docker/Dockerfile.worker
            context: .
          - service: novnc
            dockerfile: infra/docker/Dockerfile.novnc
            context: .
          # Controller, slack-bot, teams-bot, admin-ui share similar Dockerfile patterns
          - service: controller
            dockerfile: infra/docker/Dockerfile.controller
            context: .
          - service: slack-bot
            dockerfile: infra/docker/Dockerfile.slack-bot
            context: .
          - service: teams-bot
            dockerfile: infra/docker/Dockerfile.teams-bot
            context: .
          - service: admin-ui
            dockerfile: infra/docker/Dockerfile.admin-ui
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image-tag: ${{ github.sha }}

  # ===========================================================================
  # Stage 4: SBOM Generation + Signing
  # Per spec section 15.9
  # ===========================================================================
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        service: [api, controller, worker, novnc, slack-bot, teams-bot, admin-ui]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate SBOM (CycloneDX)
        run: |
          IMAGE="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.service }}:${GITHUB_SHA}"
          SBOM_FILE="sbom-${{ matrix.service }}.cdx.json"

          echo "Generating SBOM for ${IMAGE}..."
          syft "${IMAGE}" --output cyclonedx-json="${SBOM_FILE}"

          echo "SBOM_FILE=${SBOM_FILE}" >> $GITHUB_ENV

      - name: Sign SBOM with cosign (keyless)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature "${SBOM_FILE}.sig" \
            --output-certificate "${SBOM_FILE}.cert" \
            "${SBOM_FILE}"

      - name: Verify SBOM signature
        run: |
          cosign verify-blob \
            --signature "${SBOM_FILE}.sig" \
            --certificate "${SBOM_FILE}.cert" \
            --certificate-identity-regexp '.*' \
            --certificate-oidc-issuer-regexp '.*' \
            "${SBOM_FILE}"

      - name: Attach SBOM to image in registry
        run: |
          IMAGE="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.service }}:${GITHUB_SHA}"
          cosign attach sbom \
            --sbom "${SBOM_FILE}" \
            --type cyclonedx \
            "${IMAGE}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: |
            sbom-${{ matrix.service }}.cdx.json
            sbom-${{ matrix.service }}.cdx.json.sig
            sbom-${{ matrix.service }}.cdx.json.cert

  # ===========================================================================
  # Stage 5: E2E Tests (k3d ephemeral cluster)
  # ===========================================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create ephemeral k3d cluster
        run: |
          k3d cluster create browser-hitl-e2e \
            --agents 2 \
            --k3s-arg "--disable=traefik@server:0" \
            --timeout 120s \
            --wait

      - name: Import images into k3d
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          SERVICES=(api controller worker novnc slack-bot teams-bot admin-ui)

          for svc in "${SERVICES[@]}"; do
            IMAGE="${REGISTRY}/${IMAGE_PREFIX}/${svc}:${IMAGE_TAG}"
            echo "Importing ${IMAGE}..."
            docker pull "${IMAGE}" || echo "WARN: Could not pull ${IMAGE}, may need to build locally"
            k3d image import "${IMAGE}" -c browser-hitl-e2e || true
          done

      - name: Deploy with Helm
        run: |
          IMAGE_TAG="${GITHUB_SHA}"

          helm upgrade --install browser-hitl ./charts/browser-hitl \
            --namespace browser-hitl \
            --create-namespace \
            --set images.api.repository="${REGISTRY}/${IMAGE_PREFIX}/api" \
            --set images.api.tag="${IMAGE_TAG}" \
            --set images.controller.repository="${REGISTRY}/${IMAGE_PREFIX}/controller" \
            --set images.controller.tag="${IMAGE_TAG}" \
            --set images.worker.repository="${REGISTRY}/${IMAGE_PREFIX}/worker" \
            --set images.worker.tag="${IMAGE_TAG}" \
            --set images.novnc.repository="${REGISTRY}/${IMAGE_PREFIX}/novnc" \
            --set images.novnc.tag="${IMAGE_TAG}" \
            --set images.slackBot.repository="${REGISTRY}/${IMAGE_PREFIX}/slack-bot" \
            --set images.slackBot.tag="${IMAGE_TAG}" \
            --set images.teamsBot.repository="${REGISTRY}/${IMAGE_PREFIX}/teams-bot" \
            --set images.teamsBot.tag="${IMAGE_TAG}" \
            --set images.adminUi.repository="${REGISTRY}/${IMAGE_PREFIX}/admin-ui" \
            --set images.adminUi.tag="${IMAGE_TAG}" \
            --set secrets.postgresPassword="e2e-test-password" \
            --set secrets.jwtSigningKey="e2e-test-jwt-key-minimum-32-characters" \
            --set secrets.adminBootstrapPassword="e2e-admin-password" \
            --set secrets.minioAccessKey="minioadmin" \
            --set secrets.minioSecretKey="minioadmin" \
            --set slackBot.enabled=false \
            --set teamsBot.enabled=false \
            --set ingress.enabled=false \
            --wait \
            --timeout 300s

      - name: Wait for services to be ready
        run: |
          echo "Waiting for all pods to be ready..."
          kubectl -n browser-hitl wait --for=condition=ready pod --all --timeout=300s || true
          echo ""
          echo "Pod status:"
          kubectl -n browser-hitl get pods
          echo ""
          echo "Service status:"
          kubectl -n browser-hitl get svc

      - name: Run E2E smoke checks
        run: |
          set -euo pipefail

          # Port-forward API service for E2E tests
          kubectl -n browser-hitl port-forward svc/browser-hitl-api 8080:8080 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap 'kill ${PF_PID} || true' EXIT
          sleep 5

          API_URL="http://localhost:8080" \
          ADMIN_EMAIL="admin@browser-hitl.local" \
          ADMIN_PASSWORD="e2e-admin-password" \
          ./scripts/e2e-smoke.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Pod logs ==="
          for pod in $(kubectl -n browser-hitl get pods -o name); do
            echo "--- ${pod} ---"
            kubectl -n browser-hitl logs "${pod}" --all-containers --tail=100 || true
          done
          echo ""
          echo "=== Events ==="
          kubectl -n browser-hitl get events --sort-by='.lastTimestamp'

      - name: Cleanup k3d cluster
        if: always()
        run: |
          k3d cluster delete browser-hitl-e2e

  # ===========================================================================
  # Stage 6: Publish (tag release images)
  # Only runs on main branch pushes
  # ===========================================================================
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [sbom, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service: [api, controller, worker, novnc, slack-bot, teams-bot, admin-ui]
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Tag and sign release image
        run: |
          SOURCE="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.service }}:${GITHUB_SHA}"
          TARGET="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.service }}:latest"

          # Pull, retag, push
          docker pull "${SOURCE}"
          docker tag "${SOURCE}" "${TARGET}"
          docker push "${TARGET}"

          # Sign the image with cosign (keyless)
          cosign sign --yes "${TARGET}"
          cosign sign --yes "${SOURCE}"

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ matrix.service }}

      - name: Attach SBOM to release image
        run: |
          TARGET="${REGISTRY}/${IMAGE_PREFIX}/${{ matrix.service }}:latest"
          SBOM_FILE="sbom-${{ matrix.service }}.cdx.json"

          if [[ -f "${SBOM_FILE}" ]]; then
            cosign attach sbom \
              --sbom "${SBOM_FILE}" \
              --type cyclonedx \
              "${TARGET}"
          fi
