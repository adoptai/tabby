name: Bug Report
description: Report a bug in Tabby
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Brief description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: tabby-version
    attributes:
      label: Tabby version
      placeholder: "e.g. 1.3.0"
    validations:
      required: false

  - type: input
    id: k8s-version
    attributes:
      label: Kubernetes version
      placeholder: "e.g. 1.29.0"
    validations:
      required: false

  - type: input
    id: helm-version
    attributes:
      label: Helm chart version
      placeholder: "e.g. 1.3.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots. Pod logs from `kubectl logs` are most helpful.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context about the problem (DSL scripts, Helm values, etc.).
    validations:
      required: false
